version: "3.8"

services:

  app:
    build: .
    container_name: exception-ai-app
    ports:
      - "8501:8501"
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 9000
    ports:
      - "9000:9000"

  mcp:
    build: .
    command: python mcp_server.py
    ports:
      - "8000:8000" 

volumes:
  ollama_data: